<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zelus · Iniciar sesión</title>
    <link rel="icon" type="image/webp" href="https://assets.cdn.filesafe.space/FnGLAWtvRPTxr8Duhr3q/media/69dd8dcf02cd38b17c4f74c0.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #08070f;
        --border: rgba(139, 92, 246, 0.2);
        --purple: #8b5cf6;
        --pink: #d946ef;
        --text: #f1f0f7;
        --text2: #a09cbf;
        --green: #34d399;
        --red: #f87171;
      }

      body {
        font-family: 'Sora', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 40% at 30% 30%, rgba(139,92,246,0.1) 0%, transparent 60%),
          radial-gradient(ellipse 40% 60% at 70% 70%, rgba(217,70,239,0.07) 0%, transparent 60%);
        pointer-events: none;
      }

      .card {
        background: #ffffff;
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        position: relative;
        z-index: 1;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      }

      .logo {
        text-align: center;
        margin-bottom: 32px;
      }

      .logo img {
        width: 140px;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 8px;
        color: #1a1a2e;
      }

      .subtitle {
        font-size: 14px;
        color: #666;
        text-align: center;
        margin-bottom: 32px;
        line-height: 1.5;
      }

      .form-group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #555;
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        background: #f7f7fb;
        border: 1px solid #e0ddf0;
        border-radius: 10px;
        color: #1a1a2e;
        font-size: 14px;
        font-family: 'Sora', sans-serif;
        transition: border-color 0.2s;
        outline: none;
      }

      input:focus {
        border-color: var(--purple);
      }

      input::placeholder {
        color: #aaa;
      }

      .btn {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        font-family: 'Sora', sans-serif;
        background: linear-gradient(135deg, var(--purple), var(--pink));
        color: white;
        box-shadow: 0 4px 20px rgba(139,92,246,0.3);
        transition: all 0.2s;
        margin-top: 8px;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(139,92,246,0.4);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        text-align: center;
        display: none;
      }

      .message.success {
        background: rgba(52,211,153,0.1);
        border: 1px solid rgba(52,211,153,0.3);
        color: #059669;
        display: block;
      }

      .message.error {
        background: rgba(248,113,113,0.1);
        border: 1px solid rgba(248,113,113,0.3);
        color: #dc2626;
        display: block;
      }

      .footer {
        margin-top: 24px;
        text-align: center;
        font-size: 12px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <img src="https://assets.cdn.filesafe.space/FnGLAWtvRPTxr8Duhr3q/media/69dd787dcaf24b80a0ff075b.webp" alt="Zelus">
      </div>
      <h1>Bienvenido</h1>
      <p class="subtitle">Ingresa tu correo y te enviaremos un enlace para acceder a tu área personal.</p>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com" />
      </div>

      <button class="btn" id="btn" onclick="enviarMagicLink()">Enviar enlace de acceso</button>

      <div class="message" id="message"></div>

      <div class="footer">
        Zelus by Penguin FX · Área privada de estudiantes
      </div>
    </div>

    <script type="module">
      import { supabase } from './supabase.js'

      window.enviarMagicLink = async function() {
        const email = document.getElementById('email').value
        const btn = document.getElementById('btn')
        const msg = document.getElementById('message')

        if (!email) {
          msg.className = 'message error'
          msg.textContent = 'Por favor ingresa tu correo.'
          return
        }

        btn.disabled = true
        btn.textContent = 'Enviando...'
        msg.className = 'message'

        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: 'https://zelus.penguinfxacademy.com'
          }
        })

        if (error) {
          msg.className = 'message error'
          msg.textContent = 'Hubo un error. Intenta de nuevo.'
          btn.disabled = true
btn.textContent = 'Verificando acceso...'
msg.className = 'message'

// Verificar acceso en GHL via Make
const webhookRes = await fetch('https://hook.us2.make.com/cwpmfl1rgfkd8en9p72wvwa24rbwijj2', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ email })
})

const webhookData = await webhookRes.json()

if (!webhookData.autorizado) {
  msg.className = 'message error'
  msg.textContent = 'No tienes acceso a Zelus. Contacta a Penguin FX.'
  btn.disabled = false
  btn.textContent = 'Enviar enlace de acceso'
  return
}

// Si está autorizado, enviar magic link
const { error } = await supabase.auth.signInWithOtp({
  email,
  options: {
    emailRedirectTo: 'https://zelus.penguinfxacademy.com'
  }
})

if (error) {
  msg.className = 'message error'
  msg.textContent = 'Hubo un error. Intenta de nuevo.'
  btn.disabled = false
  btn.textContent = 'Enviar enlace de acceso'
} else {
  msg.className = 'message success'
  msg.textContent = '✓ Enlace enviado. Revisa tu correo.'
  btn.textContent = 'Enlace enviado'
}
      }
    </script>
  </body>
</html>
